<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Tracker Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js" defer></script>
</head>
<body>
    <header>
        <h1>Flight Tracker Dashboard</h1>
    </header>
    <main>
        <section id="search">
            <input type="text" id="flight-number" placeholder="Enter Flight Number">
            <button id="track-flight">Track Flight</button>
        </section>
        <section id="flight-info">
            <h2>Flight Information</h2>
            <div id="info-display"></div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Flight Tracker, Inc.</p>
    </footer>
</body>
</html>
